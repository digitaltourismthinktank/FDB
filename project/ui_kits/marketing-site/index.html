<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDB 2026 · Marketing site UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--fdb-font-sans);
    background: var(--fdb-cream);
    color: var(--fdb-ink);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  #root [data-screen-label] { min-height: calc(100vh - 0px); }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
  const { useState } = React;

  const SCREENS = {
    '/':           { label: '01 Overview',      Page: OverviewPage   },
    '/leadership': { label: '02 Leadership',    Page: LeadershipPage },
    '/summit':     { label: '03 Summit',        Page: SummitPage     },
    '/awards':     { label: '04 X. Awards',     Page: AwardsPage     },
  };

  function App() {
    const [path, setPath] = useState('/');
    const [dark, setDark] = useState(false);
    const { label, Page } = SCREENS[path];
    return (
      <div data-screen-label={label} className={dark ? 'fdb-dark' : ''} style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--fdb-cream)', color: 'var(--fdb-ink)' }}>
        <Header currentPath={path} onNav={setPath} dark={dark} onToggleDark={() => setDark(d => !d)}/>
        <main style={{ flex: 1 }}>
          <Page onNav={setPath} dark={dark}/>
        </main>
        <Footer dark={dark}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
