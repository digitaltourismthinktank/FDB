<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo · X. Awards" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.x-row { display: flex; align-items: center; gap: 56px; padding: 12px 0; }
.x-cell { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.x-cell img { display: block; }
.x-cell .wordmark { height: 92px; width: auto; }
.x-cell .mark { height: 110px; width: auto; }
.x-cell .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fdb-ink-faint); }
</style></head><body>
<div class="card">
  <div class="x-row">
    <div class="x-cell">
      <img class="wordmark" src="../assets/logos/x-awards-wordmark.png" alt="X. Awards">
      <span class="lbl">Horizontal lockup</span>
    </div>
    <div class="x-cell">
      <img class="mark" src="../assets/logos/x-awards-mark.png" alt="X. Awards mark">
      <span class="lbl">Mark only · square</span>
    </div>
  </div>
</div></body></html>
