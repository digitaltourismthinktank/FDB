<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Colors · Foreground · Dark" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw { display: flex; flex-direction: column; gap: 10px; }
.chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(255,255,255,0.08); }
.sw .name { font-size: 11px; font-weight: 700; color: var(--fdb-dark-fg); }
.sw .hex { font-size: 10px; font-family: var(--fdb-font-mono); color: var(--fdb-dark-fg-muted); }
.sw .role { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fdb-dark-fg-faint); }
</style></head>
<body class="fdb-dark">
<div class="card">
  <div class="swatch-grid">
    <div class="sw"><div class="chip" style="background:#F0F0F0"></div><span class="name">FG</span><span class="hex">#F0F0F0</span><span class="role">Headlines</span></div>
    <div class="sw"><div class="chip" style="background:#B8B0A4"></div><span class="name">FG Mid</span><span class="hex">#B8B0A4</span><span class="role">Body</span></div>
    <div class="sw"><div class="chip" style="background:#7A7A7A"></div><span class="name">FG Muted</span><span class="hex">#7A7A7A</span><span class="role">Captions</span></div>
    <div class="sw"><div class="chip" style="background:#4A4A4A"></div><span class="name">FG Faint</span><span class="hex">#4A4A4A</span><span class="role">Labels · TBC</span></div>
  </div>
</div>
</body></html>
