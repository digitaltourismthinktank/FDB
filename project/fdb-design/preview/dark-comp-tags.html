<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Components · Tags & pills · Dark" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 12px; }
.tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--fdb-dark-accent-tint); color: var(--fdb-dark-accent); border-radius: 2px; padding: 4px 9px; }
.pill { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fdb-dark-accent); border: 1px solid var(--fdb-dark-accent-soft); background: var(--fdb-dark-accent-tint); padding: 5px 11px; border-radius: 2px; }
.tag.dark { background: #F0F0F0; color: #1A1A1A; }
.tag.outline { background: transparent; border: 1px solid var(--fdb-dark-accent-soft); color: var(--fdb-dark-accent); }
.lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fdb-dark-fg-faint); margin-top: 12px; }
</style></head>
<body class="fdb-dark">
<div class="card">
  <div class="row">
    <span class="tag">Provocation</span>
    <span class="tag">Framework</span>
    <span class="tag">Peer testimony</span>
    <span class="tag">Policy output</span>
    <span class="pill">Invite Only</span>
    <span class="tag outline">Day One</span>
    <span class="tag dark">FDB 2026</span>
  </div>
  <div class="lbl">Tag (fill) · Pill · Outline · Inverse</div>
</div></body></html>
