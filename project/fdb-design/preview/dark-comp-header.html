<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Components · Header · Dark" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 0; }
.hdr { background: var(--fdb-dark-bg); border-bottom: 1px solid rgba(255,255,255,0.10); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 92px; }
.left { display: flex; align-items: center; gap: 18px; }
.left img { height: 44px; width: auto; display: block; }
.right { display: flex; align-items: center; gap: 14px; }
.lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fdb-dark-fg-muted); border-left: 1px solid rgba(255,255,255,0.18); padding-left: 14px; margin-left: 4px; }
.pill { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fdb-dark-accent); border: 1px solid var(--fdb-dark-accent-soft); background: var(--fdb-dark-accent-tint); padding: 5px 11px; border-radius: 2px; }
.link { font-size: 11px; font-weight: 600; color: var(--fdb-dark-fg-mid); background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.18); padding: 0 0 1px; cursor: pointer; font-family: inherit; }
</style></head>
<body class="fdb-dark">
<div class="card">
  <header class="hdr">
    <div class="left">
      <img src="../assets/logos/dark/fdb-banner-dark.png" alt="Future Destination Brand.">
      <span class="lbl">Dublin · December 2026</span>
    </div>
    <div class="right">
      <span class="pill">Invite Only</span>
      <button class="link">Get in touch</button>
    </div>
  </header>
</div></body></html>
