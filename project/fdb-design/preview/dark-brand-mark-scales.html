<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo · Mark scales · Dark" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.row-marks { display: flex; align-items: flex-end; gap: 56px; padding: 8px 0 4px; }
.mark-cell { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.mark-cell img { display: block; }
.mark-cell .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fdb-dark-fg-muted); }
</style></head>
<body class="fdb-dark">
<div class="card">
  <div class="row-marks">
    <div class="mark-cell"><img src="../assets/logos/dark/fdb-mark-dark.png" style="height: 180px;"><span class="lbl">Hero · 180 px</span></div>
    <div class="mark-cell"><img src="../assets/logos/dark/fdb-mark-dark.png" style="height: 72px;"><span class="lbl">Card · 72 px</span></div>
    <div class="mark-cell"><img src="../assets/logos/dark/fdb-mark-dark.png" style="height: 30px;"><span class="lbl">UI · 30 px</span></div>
    <div class="mark-cell"><img src="../assets/logos/dark/fdb-mark-dark.png" style="height: 20px;"><span class="lbl">Footer · 20 px</span></div>
  </div>
</div>
</body></html>
