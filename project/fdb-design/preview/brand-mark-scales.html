<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo · Mark scales" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.row-marks { display: flex; align-items: flex-end; gap: 56px; padding: 8px 0 4px; }
.mark-cell { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.mark-cell .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fdb-ink-faint); }
</style></head><body>
<div class="card">
  <div class="row-marks">
    <div class="mark-cell">
      <svg width="180" height="180" viewBox="0 0 144 144" fill="none">
        <rect x="2" y="2" width="80" height="80" rx="6" stroke="#8239C1" stroke-width="2"/>
        <rect x="30" y="30" width="80" height="80" rx="6" stroke="#9B6FE0" stroke-width="2"/>
        <rect x="58" y="58" width="80" height="80" rx="6" stroke="#C9AAEE" stroke-width="2"/>
      </svg>
      <span class="lbl">Hero · 180 px</span>
    </div>
    <div class="mark-cell">
      <svg width="72" height="72" viewBox="0 0 144 144" fill="none">
        <rect x="2" y="2" width="80" height="80" rx="6" stroke="#8239C1" stroke-width="3"/>
        <rect x="30" y="30" width="80" height="80" rx="6" stroke="#9B6FE0" stroke-width="3"/>
        <rect x="58" y="58" width="80" height="80" rx="6" stroke="#C9AAEE" stroke-width="3"/>
      </svg>
      <span class="lbl">Card · 72 px</span>
    </div>
    <div class="mark-cell">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <rect x="1" y="1" width="18" height="18" rx="2" stroke="#8239C1" stroke-width="1.5"/>
        <rect x="6" y="6" width="18" height="18" rx="2" stroke="#9B6FE0" stroke-width="1.5"/>
        <rect x="11" y="11" width="18" height="18" rx="2" stroke="#C9AAEE" stroke-width="1.5"/>
      </svg>
      <span class="lbl">UI · 30 px</span>
    </div>
    <div class="mark-cell">
      <svg width="20" height="20" viewBox="0 0 30 30" fill="none">
        <rect x="1" y="1" width="18" height="18" rx="2" stroke="#8239C1" stroke-width="1.5"/>
        <rect x="6" y="6" width="18" height="18" rx="2" stroke="#9B6FE0" stroke-width="1.5"/>
        <rect x="11" y="11" width="18" height="18" rx="2" stroke="#C9AAEE" stroke-width="1.5"/>
      </svg>
      <span class="lbl">Footer · 20 px</span>
    </div>
  </div>
</div></body></html>
