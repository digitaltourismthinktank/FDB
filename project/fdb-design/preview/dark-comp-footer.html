<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 0; }
.foot { border-top: 1px solid rgba(255,255,255,0.10); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; gap: 18px 24px; flex-wrap: wrap; }
.left { display: flex; align-items: center; gap: 18px; }
.left img { height: 30px; width: auto; display: block; }
.host { display: flex; align-items: center; gap: 10px; }
.host .lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fdb-dark-fg-faint); white-space: nowrap; }
.host .plate { display: inline-flex; align-items: center; background: #fff; border-radius: 3px; padding: 4px 8px; }
.host img { height: 22px; width: auto; display: block; }
.txt { font-size: 11px; color: var(--fdb-dark-fg-faint); line-height: 1.5; }
.txt strong { color: var(--fdb-dark-fg-muted); font-weight: 600; }
</style></head>
<body class="fdb-dark">
<div class="card">
  <footer class="foot">
    <div class="left">
      <img src="../assets/logos/dark/fdb-banner-dark.png" alt="Future Destination Brand.">
      <span class="txt"><strong>2026 Edition</strong> · Digital Tourism Think Tank</span>
    </div>
    <div class="host">
      <span class="lbl">Host partner</span>
      <span class="plate"><img src="../assets/logos/failte-ireland.png" alt="Fáilte Ireland"></span>
    </div>
    <span class="txt">Ireland EU Council Presidency · H2 2026</span>
  </footer>
</div></body></html>
