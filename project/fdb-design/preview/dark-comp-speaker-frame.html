<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Components · Speaker frame · Dark" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.wrap { display: grid; grid-template-columns: 220px 1fr; gap: 28px; align-items: end; }
.photo-frame { position: relative; width: 200px; height: 240px; }
.photo { position: absolute; inset: 0; border: 2px solid var(--fdb-dark-accent); border-radius: 2px; background: #5A7488; overflow: hidden; z-index: 2; }
.photo svg { position: absolute; bottom: -10px; right: 10%; width: 80%; height: 80%; opacity: 0.9; }
.frame-bg-1 { position: absolute; top: 18px; left: 18px; width: 100%; height: 100%; border: 1px solid var(--fdb-dark-accent-soft); border-radius: 2px; z-index: 1; }
.frame-bg-2 { position: absolute; top: 36px; left: 36px; width: 100%; height: 100%; border: 1px solid var(--fdb-dark-accent-soft); border-radius: 2px; opacity: 0.6; z-index: 0; }
.meta { padding-bottom: 8px; }
.name { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; color: var(--fdb-dark-fg); line-height: 1.15; }
.org { font-size: 13px; color: var(--fdb-dark-fg-mid); margin-top: 4px; }
.role { font-size: 12px; color: var(--fdb-dark-fg-muted); margin-top: 2px; }
</style></head>
<body class="fdb-dark">
<div class="card" style="padding: 24px 32px;">
  <div class="wrap">
    <div class="photo-frame">
      <div class="frame-bg-2"></div>
      <div class="frame-bg-1"></div>
      <div class="photo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="50" cy="36" rx="18" ry="22" fill="#2A3F50"/>
          <path d="M14 100 Q20 60 50 60 Q80 60 86 100 Z" fill="#2A3F50"/>
        </svg>
      </div>
    </div>
    <div class="meta">
      <div class="name">Caroline Bocquel</div>
      <div class="org">Fáilte Ireland</div>
      <div class="role">CEO</div>
    </div>
  </div>
</div></body></html>
