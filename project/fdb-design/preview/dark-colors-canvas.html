<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Colors · Canvas · Dark" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.swatch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw { display: flex; flex-direction: column; gap: 10px; }
.chip { aspect-ratio: 1.6; border-radius: 4px; border: 1px solid rgba(255,255,255,0.10); }
.sw .name { font-size: 11px; font-weight: 700; color: var(--fdb-dark-fg); }
.sw .hex { font-size: 10px; font-family: var(--fdb-font-mono); color: var(--fdb-dark-fg-muted); }
.sw .role { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fdb-dark-fg-faint); }
</style></head>
<body class="fdb-dark">
<div class="card">
  <div class="swatch-grid">
    <div class="sw"><div class="chip" style="background:#1A1A1A"></div><span class="name">BG</span><span class="hex">#1A1A1A</span><span class="role">Page canvas</span></div>
    <div class="sw"><div class="chip" style="background:#242424"></div><span class="name">BG Elev</span><span class="hex">#242424</span><span class="role">Cards · raised</span></div>
    <div class="sw"><div class="chip" style="background:#0E0E0E"></div><span class="name">BG Deep</span><span class="hex">#0E0E0E</span><span class="role">Footer · extreme</span></div>
  </div>
</div>
</body></html>
