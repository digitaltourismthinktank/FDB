<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Type · Micro labels" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.spec { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fdb-ink-faint); margin-top: 6px; }
.r { margin-bottom: 18px; }
.eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fdb-purple); }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fdb-ink-faint); }
.meta-row { display: flex; gap: 16px; align-items: baseline; }
.meta-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fdb-ink-faint); width: 90px; }
.meta-val { font-size: 14px; font-weight: 600; color: var(--fdb-ink); }
</style></head><body>
<div class="card">
  <div class="r"><div class="eyebrow">Day One · Leadership Programme</div><div class="spec">Eyebrow · Inter 700 · 12 · 0.12em · Purple</div></div>
  <div class="r"><div class="section-label">About the day</div><div class="spec">Section Label · Inter 700 · 11 · 0.14em · Ink Faint</div></div>
  <div class="r">
    <div class="meta-row"><span class="meta-lbl">Date</span><span class="meta-val">December 2026 (TBC)</span></div>
    <div class="meta-row" style="margin-top:6px;"><span class="meta-lbl">Location</span><span class="meta-val">Dublin, Ireland</span></div>
    <div class="spec">Meta Label · Inter 700 · 10 · 0.1em · Ink Faint</div>
  </div>
</div></body></html>
