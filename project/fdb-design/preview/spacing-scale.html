<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Spacing · Scale" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; align-items: flex-end; gap: 18px; }
.box { background: var(--fdb-purple-tint); border: 1px solid var(--fdb-purple-soft); }
.b1 { width: 4px; height: 4px; }
.b2 { width: 8px; height: 8px; }
.b3 { width: 12px; height: 12px; }
.b4 { width: 16px; height: 16px; }
.b5 { width: 24px; height: 24px; }
.b6 { width: 32px; height: 32px; }
.b7 { width: 48px; height: 48px; }
.b8 { width: 64px; height: 64px; }
.b9 { width: 96px; height: 96px; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.lbl { font-size: 10px; font-weight: 700; color: var(--fdb-ink-muted); font-family: var(--fdb-font-mono); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="cell"><div class="box b1"></div><span class="lbl">4</span></div>
    <div class="cell"><div class="box b2"></div><span class="lbl">8</span></div>
    <div class="cell"><div class="box b3"></div><span class="lbl">12</span></div>
    <div class="cell"><div class="box b4"></div><span class="lbl">16</span></div>
    <div class="cell"><div class="box b5"></div><span class="lbl">24</span></div>
    <div class="cell"><div class="box b6"></div><span class="lbl">32</span></div>
    <div class="cell"><div class="box b7"></div><span class="lbl">48</span></div>
    <div class="cell"><div class="box b8"></div><span class="lbl">64</span></div>
    <div class="cell"><div class="box b9"></div><span class="lbl">96</span></div>
  </div>
</div></body></html>
