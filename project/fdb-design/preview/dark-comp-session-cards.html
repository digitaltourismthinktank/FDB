<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Components · Session cards · Dark" -->
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 28px 32px 42px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.wrap { position: relative; }
.frame {
  position: absolute; top: 10px; left: 10px; right: -10px; bottom: -10px;
  border: 1px solid var(--fdb-dark-accent-soft); border-radius: 4px;
  opacity: 0.7; pointer-events: none;
}
.sess {
  position: relative; z-index: 1;
  border: 1px solid rgba(255,255,255,0.18); border-radius: 4px;
  padding: 14px 16px; background: var(--fdb-dark-bg-elev);
}
.lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fdb-dark-accent); margin-bottom: 5px; }
.title { font-size: 12px; font-weight: 700; color: var(--fdb-dark-fg); margin-bottom: 4px; line-height: 1.3; }
.desc { font-size: 11px; color: var(--fdb-dark-fg-mid); line-height: 1.5; }
</style></head>
<body class="fdb-dark">
<div class="card">
  <div class="grid">
    <div class="wrap">
      <div class="frame"></div>
      <div class="sess">
        <div class="lbl">Session A</div>
        <div class="title">AI readiness and organisational leadership</div>
        <div class="desc">What AI actually requires of an NTO leadership team. Where the gaps are.</div>
      </div>
    </div>
    <div class="wrap">
      <div class="frame"></div>
      <div class="sess">
        <div class="lbl">Session B</div>
        <div class="title">AI and destination competitiveness</div>
        <div class="desc">How AI is reshaping where visitors go and how they choose.</div>
      </div>
    </div>
  </div>
</div></body></html>
