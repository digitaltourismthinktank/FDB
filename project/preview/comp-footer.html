<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 0; }
.foot { border-top: 1px solid rgba(26,26,26,0.10); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px 24px; flex-wrap: wrap; }
.left { display: flex; align-items: center; gap: 16px; }
.left img { height: 28px; width: auto; display: block; }
.host { display: flex; align-items: center; gap: 10px; }
.host .lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fdb-ink-faint); white-space: nowrap; }
.host img { height: 22px; width: auto; display: block; }
.txt { font-size: 11px; color: var(--fdb-ink-faint); line-height: 1.5; }
.txt strong { color: var(--fdb-ink-muted); font-weight: 600; }
</style></head><body>
<div class="card">
  <footer class="foot">
    <div class="left">
      <img src="../assets/logos/fdb-banner.png" alt="Future Destination Brand.">
      <span class="txt"><strong>2026 Edition</strong> · Digital Tourism Think Tank</span>
    </div>
    <div class="host">
      <span class="lbl">Host partner</span>
      <img src="../assets/logos/failte-ireland.png" alt="Fáilte Ireland">
    </div>
    <span class="txt">Ireland EU Council Presidency · H2 2026</span>
  </footer>
</div></body></html>
