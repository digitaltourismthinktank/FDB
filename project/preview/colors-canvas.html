<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.swatch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw { display: flex; flex-direction: column; gap: 10px; }
.chip { aspect-ratio: 1.6; border-radius: 4px; border: 1px solid rgba(26,26,26,0.10); }
.sw .name { font-size: 11px; font-weight: 700; color: var(--fdb-ink); }
.sw .hex { font-size: 10px; font-family: var(--fdb-font-mono); color: var(--fdb-ink-muted); }
.sw .role { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fdb-ink-faint); }
</style></head><body>
<div class="card">
  <div class="swatch-grid">
    <div class="sw"><div class="chip" style="background:#F5F0E9"></div><span class="name">Cream</span><span class="hex">#F5F0E9</span><span class="role">Canvas · 95%</span></div>
    <div class="sw"><div class="chip" style="background:#E6E2DA"></div><span class="name">Cream Deep</span><span class="hex">#E6E2DA</span><span class="role">Subtle blocks</span></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><span class="name">White</span><span class="hex">#FFFFFF</span><span class="role">On purple · cards</span></div>
  </div>
</div></body></html>
