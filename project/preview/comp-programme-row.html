<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.prog { border-top: 1px solid rgba(26,26,26,0.10); }
.row { display: grid; grid-template-columns: 70px 1fr; gap: 24px; padding: 18px 0; border-bottom: 1px solid rgba(26,26,26,0.10); align-items: start; }
.time { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: var(--fdb-purple); padding-top: 2px; }
.title { font-size: 14px; font-weight: 700; color: var(--fdb-ink); margin-bottom: 4px; }
.desc { font-size: 12px; line-height: 1.55; color: var(--fdb-ink-muted); margin-bottom: 8px; }
.speaker { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; color: var(--fdb-ink); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fdb-purple); }
.tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--fdb-purple-tint); color: var(--fdb-purple-deep); border-radius: 2px; padding: 3px 7px; margin-right: 4px; margin-bottom: 8px; }
</style></head><body>
<div class="card">
  <div class="prog">
    <div class="row">
      <div class="time">10:00</div>
      <div>
        <div class="title">Opening provocation</div>
        <div class="desc">Twenty minutes, no slides. A further twenty minutes of open response from participants.</div>
        <span class="tag">Provocation</span>
        <div class="speaker"><span class="dot"></span>Oliver Csendes · Former CEO, Visit Hungary</div>
      </div>
    </div>
  </div>
</div></body></html>
