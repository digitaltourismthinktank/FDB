<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.swatch-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.sw { display: flex; flex-direction: column; gap: 10px; }
.chip { aspect-ratio: 1; border-radius: 4px; border: 1px solid rgba(26,26,26,0.06); }
.sw .name { font-size: 11px; font-weight: 700; color: var(--fdb-ink); letter-spacing: -0.005em; }
.sw .hex { font-size: 10px; font-family: var(--fdb-font-mono); color: var(--fdb-ink-muted); letter-spacing: 0.02em; }
</style></head><body>
<div class="card">
  <div class="swatch-grid">
    <div class="sw"><div class="chip" style="background:#EDE5F8"></div><span class="name">Purple Tint</span><span class="hex">#EDE5F8</span></div>
    <div class="sw"><div class="chip" style="background:#C9AAEE"></div><span class="name">Purple Soft</span><span class="hex">#C9AAEE</span></div>
    <div class="sw"><div class="chip" style="background:#9B6FE0"></div><span class="name">Purple Mid</span><span class="hex">#9B6FE0</span></div>
    <div class="sw"><div class="chip" style="background:#8239C1"></div><span class="name">Purple</span><span class="hex">#8239C1</span></div>
    <div class="sw"><div class="chip" style="background:#5B1FBF"></div><span class="name">Purple Deep</span><span class="hex">#5B1FBF</span></div>
  </div>
</div></body></html>
