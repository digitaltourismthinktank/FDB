<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 28px 32px 42px; }
.wrap { position: relative; }
.frame {
  position: absolute; top: 10px; left: 10px; right: -10px; bottom: -10px;
  border: 1px solid var(--fdb-purple-soft); border-radius: 4px;
  opacity: 0.7; pointer-events: none;
}
.callout {
  position: relative; z-index: 1;
  background: var(--fdb-purple); border-radius: 4px;
  padding: 22px 24px;
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px;
}
.callout > div { color: rgba(255,255,255,0.88); }
.callout > div + div { padding-left: 22px; border-left: 1px solid rgba(255,255,255,0.15); }
.callout .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fdb-purple-soft); margin-bottom: 6px; }
.callout .txt { font-size: 12px; line-height: 1.5; }
</style></head><body>
<div class="card">
  <div class="wrap">
    <div class="frame"></div>
    <div class="callout">
      <div>
        <div class="lbl">For destinations</div>
        <div class="txt">A mechanism for the sector to speak with one voice on AI policy.</div>
      </div>
      <div>
        <div class="lbl">For technology leaders</div>
        <div class="txt">Direct engagement with leaders responsible for tourism at national scale.</div>
      </div>
      <div>
        <div class="lbl">For EU institutions</div>
        <div class="txt">A structured, expert contribution to the AI and digital policy agenda.</div>
      </div>
    </div>
  </div>
</div></body></html>
