<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.demo { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
.callout { background: var(--fdb-purple); border-radius: 4px; padding: 18px 20px; color: rgba(255,255,255,0.88); }
.callout .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fdb-purple-soft); margin-bottom: 6px; }
.callout .txt { font-size: 12px; line-height: 1.55; }
.usage { display: flex; flex-direction: column; gap: 10px; font-size: 12px; line-height: 1.55; color: var(--fdb-ink-mid); }
.usage strong { color: var(--fdb-purple); font-weight: 800; }
.usage .micro { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fdb-purple); }
</style></head><body>
<div class="card">
  <div class="demo">
    <div class="callout">
      <div class="lbl">For destinations</div>
      <div class="txt">A mechanism for the sector to speak with one voice on AI policy, rather than leaving that agenda to platform companies alone.</div>
    </div>
    <div class="usage">
      <div class="micro">Day One · Leadership</div>
      <div>AI is reshaping where destinations are discovered, <strong>how tourism is managed</strong> and how national bodies are led.</div>
    </div>
  </div>
</div></body></html>
