<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px 18px; }
.btn-primary { background: var(--fdb-purple); color: #fff; font: 700 12px/1 var(--fdb-font-sans); letter-spacing: 0.05em; text-transform: uppercase; border: none; padding: 12px 22px; border-radius: 3px; cursor: pointer; display: inline-flex; gap: 8px; align-items: center; }
.btn-primary:hover { background: var(--fdb-purple-deep); }
.btn-primary svg { width: 12px; height: 12px; }
.btn-ghost { background: none; border: none; padding: 0 0 1px; font: 600 12px/1 var(--fdb-font-sans); color: var(--fdb-ink-muted); border-bottom: 1px solid rgba(26,26,26,0.18); cursor: pointer; }
.btn-ghost:hover { color: var(--fdb-purple); border-color: var(--fdb-purple); }
.btn-outline { background: none; border: 1px solid var(--fdb-purple); color: var(--fdb-purple); font: 700 12px/1 var(--fdb-font-sans); letter-spacing: 0.05em; text-transform: uppercase; padding: 11px 18px; border-radius: 3px; cursor: pointer; }
.btn-outline:hover { background: var(--fdb-purple); color: #fff; }
.lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fdb-ink-faint); margin-top: 14px; }
</style></head><body>
<div class="card">
  <div class="row">
    <button class="btn-primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      Get in touch
    </button>
    <button class="btn-primary">Apply now</button>
    <button class="btn-outline">View programme</button>
    <button class="btn-ghost">Get in touch</button>
  </div>
  <div class="lbl">Primary · Primary (no icon) · Outline · Ghost / inline link</div>
</div></body></html>
