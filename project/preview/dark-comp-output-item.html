<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 28px 32px 36px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.wrap { position: relative; }
.frame {
  position: absolute; top: 10px; left: 10px; right: -10px; bottom: -10px;
  border: 1px solid var(--fdb-dark-accent-soft); border-radius: 4px;
  opacity: 0.7; pointer-events: none;
}
.out {
  position: relative; z-index: 1;
  border-top: 2px solid var(--fdb-dark-accent); padding: 14px 16px 16px;
  background: var(--fdb-dark-bg-elev); border-left: 1px solid rgba(255,255,255,0.10); border-right: 1px solid rgba(255,255,255,0.10); border-bottom: 1px solid rgba(255,255,255,0.10); border-radius: 0 0 4px 4px;
}
.name { font-size: 13px; font-weight: 700; color: var(--fdb-dark-fg); margin-bottom: 6px; line-height: 1.3; }
.desc { font-size: 11px; line-height: 1.6; color: var(--fdb-dark-fg-mid); }
</style></head>
<body class="fdb-dark">
<div class="card">
  <div class="grid">
    <div class="wrap"><div class="frame"></div><div class="out">
      <div class="name">State of Destination AI Report</div>
      <div class="desc">Comprehensive synthesis of insights from the leadership day. Published post-event, submitted to EU institutions.</div>
    </div></div>
    <div class="wrap"><div class="frame"></div><div class="out">
      <div class="name">Executive Briefing Summary</div>
      <div class="desc">Structured summary of the day's conclusions. Concise, formal, designed to be read by policy audiences.</div>
    </div></div>
  </div>
</div></body></html>
