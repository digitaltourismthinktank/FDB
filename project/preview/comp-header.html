<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
.card { padding: 0; }
.hdr { background: var(--fdb-cream); border-bottom: 1px solid rgba(26,26,26,0.10); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 88px; }
.left { display: flex; align-items: center; gap: 16px; }
.left img { height: 42px; width: auto; display: block; }
.right { display: flex; align-items: center; gap: 14px; }
.lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fdb-ink-muted); border-left: 1px solid rgba(26,26,26,0.18); padding-left: 14px; margin-left: 4px; }
.pill { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fdb-purple); border: 1px solid var(--fdb-purple-soft); background: var(--fdb-purple-tint); padding: 5px 11px; border-radius: 2px; }
.link { font-size: 11px; font-weight: 600; color: var(--fdb-ink-muted); background: none; border: none; border-bottom: 1px solid rgba(26,26,26,0.18); padding: 0 0 1px; cursor: pointer; font-family: inherit; }
</style></head><body>
<div class="card">
  <header class="hdr">
    <div class="left">
      <img src="../assets/logos/fdb-banner.png" alt="Future Destination Brand.">
      <span class="lbl">Dublin · December 2026</span>
    </div>
    <div class="right">
      <span class="pill">Invite Only</span>
      <button class="link">Get in touch</button>
    </div>
  </header>
</div></body></html>
